<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/popup.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <span class="material-icons">translate</span>
          <span>Web Translator</span>
        </div>
        <div class="header-icons">
          <span id="fullscreen-icon" class="material-icons">fullscreen</span>
          <span id="close-button" class="material-icons">close</span>
        </div>
      </div>

      <div class="tab-container">
        <div class="tabs">
          <button class="tab-button active" data-tab="translate">Translate</button>
          <button class="tab-button" data-tab="ask-ai">Ask AI</button>
        </div>

        <div id="translate" class="tab-content active">
          <div class="model-selector">
            <label for="gemini-model">AI Model</label>
            <select id="gemini-model">
              <option value="gemini-pro">Gemini Pro</option>
              <option value="gemini-1.0-pro">Gemini 1.0 Pro</option>
              <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
              <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
            </select>
          </div>

          <div class="language-selector">
            <div class="source-lang">
              <select id="source-language">
                <option value="auto" selected>Auto-detect</option>
                <option value="en">English</option>
                <option value="fa">Persian</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="es">Spanish</option>
                <option value="ar">Arabic</option>
                <option value="zh">Chinese</option>
                <option value="ru">Russian</option>
              </select>
            </div>
            <div class="swap-languages">
              <span class="material-icons">swap_vert</span>
            </div>
            <div class="target-lang">
              <select id="target-language">
                <option value="en">English</option>
                <option value="fa">Persian</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="es">Spanish</option>
                <option value="ar">Arabic</option>
                <option value="zh">Chinese</option>
                <option value="ru">Russian</option>
              </select>
            </div>
          </div>

          <div class="translation-area active">
            <div class="input-area">
              <textarea id="input-text" placeholder="Enter text to translate"></textarea>
              <div class="text-actions">
                <span class="material-icons clear-text">clear</span>
              </div>
            </div>
            <div class="output-area">
              <div id="output-text">Translation will appear here</div>
              <div class="text-actions">
                <span class="material-icons copy-text">content_copy</span>
              </div>
            </div>
          </div>

          <div class="page-translation">
            <button id="translate-page-button">Translate This Page</button>
          </div>
        </div>

        <div id="ask-ai" class="tab-content">
          <div class="model-selector">
            <label for="ai-model">AI Model</label>
            <select id="ai-model">
              <option value="gemini-pro">Gemini Pro</option>
              <option value="gemini-1.0-pro">Gemini 1.0 Pro</option>
              <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
              <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
            </select>
          </div>

          <div class="question-area">
            <textarea id="question" placeholder="Ask a question about this page..."></textarea>
            <div class="question-actions">
              <button id="clear-question" class="secondary-button">
                <span class="material-icons">clear</span>
              </button>
              <button id="ask-button" class="primary-button">
                <span class="material-icons">send</span>
                Ask AI
              </button>
            </div>
          </div>

          <div id="answer-container" class="answer-container">
            <div id="answer" class="answer">Ask a question to see the answer here.</div>
            <div class="answer-actions">
              <button id="copy-answer" class="icon-button">
                <span class="material-icons">content_copy</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="api-key-section">
        <div class="api-key-header">
          <span class="material-icons">vpn_key</span>
          <h3>API Settings</h3>
        </div>
        <div class="form-group">
          <div class="input-wrapper">
            <div class="api-input-container">
              <input type="text" id="api-key" placeholder="Enter your Gemini API key">
            </div>
            <button id="save-api-key" class="primary-button">
              <span class="material-icons">save</span>
              Save
            </button>
          </div>
        </div>
        <div id="api-key-status" class="status"></div>
        <div id="translation-status" class="status"></div>
      </div>
    </div>
    <script src="../scripts/popup.js"></script>
  </body>
</html>
